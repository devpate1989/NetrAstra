name: Deploy Expo web app to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Export web build
        working-directory: app
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://xtxpxkeyvcgjlditzioy.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0eHB4a2V5dmNnamxkaXR6aW95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjY4NDYsImV4cCI6MjA5NjUwMjg0Nn0.TAGmSZTU0JqG9E5m8AdwRPp2_iOBOJ0neDdD3q3jKro
          EXPO_PUBLIC_API_BASE_URL: https://netrastra.onrender.com/api

      - name: Add .nojekyll
        run: touch app/dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
