name: Keep Render server alive

on:
  schedule:
    # Every 5 minutes — Render's free tier spins down after 15 min of
    # inactivity. GitHub Actions cron schedules aren't guaranteed to fire on
    # time (can be delayed under load), so a 5-min interval leaves a much
    # bigger buffer than 14 min before hitting the 15-min spin-down window.
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 60 https://netrastra.onrender.com/api/health
